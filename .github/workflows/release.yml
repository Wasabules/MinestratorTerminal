name: Release

# Déclenché en poussant un tag de version, ex. : git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags:
      - 'v*'

# tauri-action crée la release GitHub et y attache les installeurs.
permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest' # DMG universel (Intel + Apple Silicon)
            args: '--target universal-apple-darwin'
          - platform: 'ubuntu-22.04' # .AppImage + .deb
            args: ''
          - platform: 'windows-latest' # .msi + .exe (NSIS)
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: '. -> target'

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install frontend dependencies
        run: npm ci
        working-directory: ./desktop

      - name: Build & release Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Signature des artefacts de mise à jour (clé privée en secret ; mot de passe vide).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''
        with:
          # L'app desktop vit désormais dans desktop/ (workspace : desktop/src-tauri).
          projectPath: ./desktop
          tagName: ${{ github.ref_name }}
          releaseName: 'Minestrator Terminal ${{ github.ref_name }}'
          releaseBody: |
            Client desktop **Tauri 2 + SvelteKit** pour piloter des serveurs Minecraft MineStrator.

            **Installeurs** (en pièces jointes) :
            - Windows : `.msi` et `.exe` (NSIS)
            - macOS : `.dmg` (universel Intel + Apple Silicon)
            - Linux : `.AppImage` et `.deb`
            - Android : `.apk` (signé) — à sideloader

            Mise à jour automatique intégrée (desktop) : les versions installées proposeront cette release.

            > Non signés au niveau OS : Windows SmartScreen / macOS Gatekeeper peuvent afficher un
            > avertissement au premier lancement (les artefacts de mise à jour, eux, sont signés et vérifiés).
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  # --- App mobile Android : APK signé, attaché à la même release ---
  # `if: always()` → l'APK est produit même si un build desktop échoue (ex. course sur
  # latest.json de tauri-action) ; `needs` ne sert qu'à l'ordre (la release existe déjà).
  android:
    needs: release
    if: ${{ always() }}
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Android NDK
        id: ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27

      - name: Install Rust (stable) + cibles Android
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: '. -> target'

      - name: Install frontend dependencies
        run: npm ci
        working-directory: ./mobile

      - name: Keystore + config de signature (depuis les secrets)
        working-directory: ./mobile/src-tauri/gen/android
        env:
          KS_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KS_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASS: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "$KS_B64" | base64 -d > "$RUNNER_TEMP/release.jks"
          cat > keystore.properties <<EOF
          storeFile=$RUNNER_TEMP/release.jks
          storePassword=$KS_PASS
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASS
          EOF

      - name: Build APK signé (release)
        working-directory: ./mobile
        env:
          NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
        run: npx tauri android build --apk

      - name: Attacher l'APK à la release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # La release draft est normalement créée par le job desktop ; sinon on la crée.
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || \
            gh release create "$GITHUB_REF_NAME" --draft --title "Minestrator Terminal $GITHUB_REF_NAME" --notes "Release."
          echo "APK produits :"
          find mobile/src-tauri/gen/android/app/build/outputs/apk -name '*.apk' -printf '  %s\t%p\n' || true
          # APK signé (release) — `*-release.apk` exclut le `*-release-unsigned.apk`.
          APK=$(find mobile/src-tauri/gen/android/app/build/outputs/apk -name '*-release.apk' ! -name '*unsigned*' | head -1)
          if [ -z "$APK" ]; then echo "APK release signé introuvable" >&2; exit 1; fi
          OUT="Minestrator-Terminal_${GITHUB_REF_NAME}_android.apk"
          cp "$APK" "$OUT"
          gh release upload "$GITHUB_REF_NAME" "$OUT" --clobber
          echo "APK attaché : $OUT ($(stat -c%s "$OUT") octets) depuis $APK"
