name: Release

# Déclenché en poussant un tag de version, ex. : git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags:
      - 'v*'

# tauri-action crée la release GitHub et y attache les installeurs.
permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest' # DMG universel (Intel + Apple Silicon)
            args: '--target universal-apple-darwin'
          - platform: 'ubuntu-22.04' # .AppImage + .deb
            args: ''
          - platform: 'windows-latest' # .msi + .exe (NSIS)
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: '. -> target'

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install frontend dependencies
        run: npm ci
        working-directory: ./desktop

      - name: Build & release Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Signature des artefacts de mise à jour (clé privée en secret ; mot de passe vide).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''
        with:
          # L'app desktop vit désormais dans desktop/ (workspace : desktop/src-tauri).
          projectPath: ./desktop
          tagName: ${{ github.ref_name }}
          releaseName: 'Minestrator Terminal ${{ github.ref_name }}'
          releaseBody: |
            Client desktop **Tauri 2 + SvelteKit** pour piloter des serveurs Minecraft MineStrator.

            **Installeurs** (en pièces jointes) :
            - Windows : `.msi` et `.exe` (NSIS)
            - macOS : `.dmg` (universel Intel + Apple Silicon)
            - Linux : `.AppImage` et `.deb`

            Mise à jour automatique intégrée : les versions installées proposeront cette release.

            > Non signés au niveau OS : Windows SmartScreen / macOS Gatekeeper peuvent afficher un
            > avertissement au premier lancement (les artefacts de mise à jour, eux, sont signés et vérifiés).
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
